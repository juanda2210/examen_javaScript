<!DOCTYPE html>

<html lang="es">

<head>

    <!-- =========================
        META TAGS
    ========================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >


    <!-- =========================
        TITLE
    ========================== -->

    <title>
        Iniciar sesión
    </title>


    <!-- =========================
        CSS
    ========================== -->

    <link
        rel="stylesheet"
        href="../css/base.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/components.css"
    >

    <link
        rel="stylesheet"
        href="../css/responsive.css"
    >

</head>

<body>

    <!-- ======================================================
        LOGIN SECTION
    ======================================================= -->

    <section class="loginSection">


        <!-- =========================
            LOGIN CARD
        ========================== -->

        <article class="loginCard">


            <!-- =========================
                TITLE
            ========================== -->

            <h1>
                Inicia sesión
            </h1>


            <p>
                Ingresa tus credenciales
                para acceder a tu cuenta
            </p>





            <!-- =========================
                INPUT IDENTIFICATION
            ========================== -->

            <input

                type="text"

                id="idSignIn"

                placeholder="Identificación"

            >





            <!-- =========================
                INPUT PASSWORD
            ========================== -->

            <input

                type="password"

                id="passSignIn"

                placeholder="Contraseña"

            >





            <!-- =========================
                BTN SIGN IN
            ========================== -->

            <button id="btnSignIn_dos">

                Iniciar sesión

            </button>

        </article>

    </section>





    <!-- ======================================================
        JS
    ======================================================= -->

    <script
        src="../js/signIn.js"
    ></script>

</body>

</html>
