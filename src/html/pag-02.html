<!DOCTYPE html>

<html lang="es">

<head>

    <!-- =========================
         META TAGS
    ========================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >


    <!-- =========================
         TITLE
    ========================== -->

    <title>
        Habitaciones | Rincón del Carmen
    </title>


    <!-- =========================
         CSS
    ========================== -->

    <link
        rel="stylesheet"
        href="../css/base.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/components.css"
    >

    <link
        rel="stylesheet"
        href="../css/responsive.css"
    >

</head>

<body>


    <!-- ======================================================
         MAIN
    ======================================================= -->

    <main class="filtersPage">


        <!-- ======================================================
             HERO
        ======================================================= -->

        <section class="filtersHero">

            <h1>
                Encuentra tu habitación ideal
            </h1>

            <p>
                Selecciona tus fechas y la cantidad de personas
                para descubrir las habitaciones disponibles
                en Rincón del Carmen.
            </p>

        </section>





        <!-- ======================================================
             FILTERS SECTION
        ======================================================= -->

        <section class="filtersSection">


            <!-- =========================
                 FILTERS FORM
            ========================== -->

            <form class="filtersForm">


                <!-- =========================
                     CHECK IN
                ========================== -->

                <div class="filterGroup">

                    <label for="fechaCheckIn">

                        Check In

                    </label>

                    <input

                        type="date"

                        id="fechaCheckIn"

                    >

                </div>





                <!-- =========================
                     CHECK OUT
                ========================== -->

                <div class="filterGroup">

                    <label for="fechaCheckOut">

                        Check Out

                    </label>

                    <input

                        type="date"

                        id="fechaCheckOut"

                    >

                </div>





                <!-- =========================
                     PEOPLE
                ========================== -->

                <div class="filterGroup">

                    <label for="numeroDePersonas">

                        Número de personas

                    </label>

                    <input

                        type="number"

                        id="numeroDePersonas"

                        min="1"

                        placeholder="Ej: 2"

                    >

                </div>

            </form>

        </section>





        <!-- ======================================================
             ROOMS SECTION
        ======================================================= -->

        <section class="roomsSection">


            <!-- =========================
                 TITLE
            ========================== -->

            <h2>
                Habitaciones disponibles
            </h2>


            <!-- =========================
                 ROOMS CONTAINER
            ========================== -->

            <div id="roomsContainer">


                <!-- =========================
                     EMPTY MESSAGE
                ========================== -->

                <p class="emptyRoomsMessage">

                    Selecciona tus fechas y la cantidad
                    de personas para comenzar la búsqueda.

                </p>

            </div>

        </section>

    </main>





    <!-- ======================================================
         SCRIPT
    ======================================================= -->

    <script
        src="../js/filtros.js"
    ></script>

</body>

</html>
