<!DOCTYPE html>

<html lang="es">

<head>

    <!-- =========================
        META TAGS
    ========================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >


    <!-- =========================
        TITLE
    ========================== -->

    <title>
        Registro | Rincón del Carmen
    </title>


    <!-- =========================
        CSS
    ========================== -->

    <link
        rel="stylesheet"
        href="../css/base.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/components.css"
    >

    <link
        rel="stylesheet"
        href="../css/responsive.css"
    >

</head>

<body>

    <!-- ======================================================
        REGISTER SECTION
    ======================================================= -->

    <section class="authSection">


        <!-- =========================
            REGISTER CARD
        ========================== -->

        <article class="authCard">


            <!-- =========================
                TITLE
            ========================== -->

            <h1>
                Crear Cuenta
            </h1>


            <!-- =========================
                DESCRIPTION
            ========================== -->

            <p>
                Regístrate para disfrutar
                de la experiencia exclusiva
                de Rincón del Carmen.
            </p>





            <!-- ======================================================
                FORM
            ======================================================= -->

            <form class="authForm">


                <!-- =========================
                    IDENTIFICATION
                ========================== -->

                <input

                    type="text"

                    id="identification"

                    placeholder="Identificación"

                >





                <!-- =========================
                    FULL NAME
                ========================== -->

                <input

                    type="text"

                    id="fullName"

                    placeholder="Nombre completo"

                >





                <!-- =========================
                    COUNTRY
                ========================== -->

                <input

                    type="text"

                    id="country"

                    placeholder="País"

                >





                <!-- =========================
                    EMAIL
                ========================== -->

                <input

                    type="email"

                    id="email"

                    placeholder="Correo electrónico"

                >





                <!-- =========================
                    PHONE NUMBER
                ========================== -->

                <input

                    type="text"

                    id="phoneNumber"

                    placeholder="Número telefónico"

                >





                <!-- =========================
                    PASSWORD
                ========================== -->

                <input

                    type="password"

                    id="password"

                    placeholder="Contraseña"

                >





                <!-- =========================
                    BTN SIGN UP
                ========================== -->

                <button

                    type="button"

                    id="btnSignUp_dos"

                >

                    Registrarse

                </button>

            </form>





            <!-- =========================
                LOGIN REDIRECT
            ========================== -->

            <p class="authRedirect">

                ¿Ya tienes una cuenta?

                <a href="login.html">

                    Inicia sesión

                </a>

            </p>

        </article>

    </section>





    <!-- ======================================================
        JS
    ======================================================= -->

    <script
        src="../js/signUp.js"
    ></script>

</body>

</html>
